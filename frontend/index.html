<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FIX LAB CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginPage">

    <h1>3D FIX LAB CRM</h1>

    <div class="login-box">

        <input
            type="password"
            id="password"
            placeholder="Введите пароль"
        >

        <button onclick="login()">
            Войти
        </button>

    </div>

</div>

<div id="crmPage" style="display:none;">

    <h1>3D FIX LAB CRM</h1>

    <div id="userInfo" class="user-info"></div>

    <button onclick="logout()">
        Выйти
    </button>

    <div class="stats">

        <div class="stat-box">
            <div class="stat-title">Всего заказов</div>
            <div class="stat-value" id="totalOrders">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">В ремонте</div>
            <div class="stat-value" id="inRepair">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">Готово</div>
            <div class="stat-value" id="readyOrders">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">Выдано</div>
            <div class="stat-value" id="doneOrders">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">Выручка</div>
            <div class="stat-value" id="totalRevenue">0 ₽</div>
        </div>

    </div>

    <h2>KPI мастеров</h2>

    <div id="mastersKpi" class="masters-kpi"></div>

    <h2>Календарь выездов</h2>

    <div id="visitsContainer" class="visits-container"></div>

    <div class="top-bar">

        <input
            type="text"
            id="search"
            placeholder="Поиск по клиенту или телефону"
        >

        <select id="statusFilter">
            <option value="all">Все</option>
            <option value="Принят">Принят</option>
            <option value="В ремонте">В ремонте</option>
            <option value="Готов">Готов</option>
            <option value="Выдан">Выдан</option>
        </select>

    </div>

    <div class="orders" id="orders"></div>

</div>

<div id="imageModal" class="image-modal" onclick="closeImageModal()">
    <img id="modalImage" class="modal-image">
</div>    
    
<script src="script.js"></script>

</body>
</html>
